line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
]

[lint.per-file-ignores]
"packages/agentops_core/tests/*.py" = ["B011"]
"packages/showcase_agents/**/*.py" = ["ALL"]
"packages/flows2agents/**/*.py" = ["ALL"]
